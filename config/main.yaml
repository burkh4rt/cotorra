%YAML 1.2
---
processed_data_home: /gpfs/data/bbj-lab/users/burkh4rt/cocoa/processed
# ~/cocoa/processed
# /gpfs/data/bbj-lab/users/burkh4rt/cocoa/processed
# /mnt/bbj-lab/users/burkh4rt/cocoa/processed

model_config: ./config/model/llama-32.yaml
max_seq_len: !!int 4096
n_epochs: !!int 5

wandb:
  project: cotorra
  run_name: &run_name cotorra-llama-32
output_dir: ./output

tokens_of_interest:
  - XFR-IN//icu
  - RESP//imv
  - DSCG//expired
  - DSCG//hospice
toi_weight: !!float 10

training_args:
  report_to: wandb
  run_name: *run_name
  per_device_train_batch_size: !!int 16
  per_device_eval_batch_size: !!int 16
  save_total_limit: !!int 1
  metric_for_best_model: eval_loss
  load_best_model_at_end: !!bool true
  greater_is_better: !!bool false
  eval_strategy: steps
  save_strategy: best
  ddp_find_unused_parameters: !!bool false
  neftune_noise_alpha: !!float 5.0
  auto_find_batch_size: !!bool true
  learning_rate: !!float 2e-4
  gradient_accumulation_steps: !!int 1
  max_steps: !!int 3

tuning_args:
  direction: minimize
  backend: optuna
  n_trials: !!int 10
